name: Deploy web (GitHub Pages)

on:
  push:
    branches: [main, feature/web-version]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Version epinglee : le template tools/web.tmpl cible pygbag 0.9.3
      - name: Install pygbag
        run: python -m pip install --upgrade pip "pygbag==0.9.3"

      - name: Build web
        run: python tools/build_web.py --build

      # GitHub Pages ne doit pas passer la sortie dans Jekyll
      - name: Disable Jekyll
        run: touch build/ColorMage/build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/ColorMage/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
