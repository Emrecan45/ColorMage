<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ColorMage</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
    html, body { margin: 0; height: 100%; background: #0a0a1c; }
    body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; font-family: 'VT323', monospace; text-align: center; padding: 20px;
    }
    .logo { width: 400px; max-width: 84%; image-rendering: auto; }
    .btn {
        font-family: 'VT323', monospace; font-size: 30px; color: #0a0a1c; background: #ffc83c;
        text-decoration: none; padding: 14px 46px; border-radius: 12px; box-shadow: 0 6px 0 #c8961e;
        transition: 0.08s;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c8961e; }
    .note { color: #8a8aa0; font-size: 18px; max-width: 360px; }
</style>
</head>
<body>
    <img class="logo" src="https://emrecan45.github.io/colormage/logo.png" alt="ColorMage">
    <a class="btn" href="https://emrecan45.github.io/colormage/" target="_blank" rel="noopener">▶ Play</a>
    <div class="note">Opens in a new tab so your progress is saved between sessions.</div>
</body>
</html>
